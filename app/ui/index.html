<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GuardedOps</title>
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>GuardedOps</h1>
        <p>Phase 2 风险预览与确认闭环</p>
      </header>

      <form id="chat-form" class="query-form">
        <label for="raw-user-input">自然语言请求</label>
        <div class="input-row">
          <input
            id="raw-user-input"
            name="raw_user_input"
            type="text"
            autocomplete="off"
            placeholder="例如：请创建普通用户 demo_guest"
            required
          />
          <button id="send-button" type="submit">发送</button>
        </div>
      </form>

      <section class="status-line" aria-live="polite">
        <span id="request-status">等待输入</span>
      </section>

      <section id="result-panel" class="result-panel" hidden>
        <article class="request-card">
          <h2>用户输入</h2>
          <p id="user-input-text">-</p>
        </article>

        <div class="summary-grid">
          <article id="risk-card" class="state-card">
            <h2>风险等级</h2>
            <p id="risk-level">-</p>
            <p id="risk-reasons" class="muted">-</p>
          </article>
          <article>
            <h2>计划状态</h2>
            <p id="plan-status">-</p>
            <p id="plan-reason" class="muted">-</p>
          </article>
          <article>
            <h2>执行状态</h2>
            <p id="execution-status">-</p>
          </article>
        </div>

        <article id="confirmation-panel" class="confirmation-panel" hidden>
          <h2>待确认</h2>
          <p>请在上方输入框提交精确确认语。</p>
          <code id="confirmation-text">-</code>
        </article>

        <article id="refusal-panel" class="refusal-panel" hidden>
          <h2>拒绝原因与安全替代方案</h2>
          <p id="refusal-reason">-</p>
          <p id="safe-alternative" class="muted">-</p>
        </article>

        <article class="plan-card">
          <h2>执行计划</h2>
          <ul id="plan-steps" class="plan-steps"></ul>
        </article>

        <article class="explanation">
          <h2>解释</h2>
          <p id="explanation-text">-</p>
        </article>

        <article class="result-summary-card">
          <h2>结果摘要</h2>
          <p id="result-summary">-</p>
        </article>

        <article class="raw-result">
          <h2>执行结果</h2>
          <pre id="result-json">-</pre>
        </article>
      </section>
    </main>

    <script src="/ui/app.js"></script>
  </body>
</html>
